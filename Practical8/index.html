<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Admission Form</title>
    <style>
        :root {
            --primary: #ff4500;
            --success: #2ecc71;
            --error: #e74c3c;
            --dark: #1a1a1a;
            --light: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            text-align: center;
            color: var(--dark);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #666;
        }

        /* Validation States */
        .form-group.success input, .form-group.success select {
            border-color: var(--success);
        }

        .form-group.error input, .form-group.error select {
            border-color: var(--error);
        }

        .error-message {
            color: var(--error);
            font-size: 12px;
            margin-top: 5px;
            height: 15px;
            display: block;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--dark);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: var(--primary);
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Gym Membership</h2>
    <form id="gymForm" novalidate>
        
        <!-- Full Name -->
        <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="John Doe">
            <span class="error-message" id="nameError"></span>
        </div>

        <!-- Email -->
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="john@example.com">
            <span class="error-message" id="emailError"></span>
        </div>

        <!-- Age -->
        <div class="form-group">
            <label for="age">Age (Min 16)</label>
            <input type="number" id="age" placeholder="25">
            <span class="error-message" id="ageError"></span>
        </div>

        <!-- Membership Plan -->
        <div class="form-group">
            <label for="plan">Membership Plan</label>
            <select id="plan">
                <option value="">Select a plan</option>
                <option value="monthly">Monthly Pass</option>
                <option value="quarterly">Quarterly Pass</option>
                <option value="annual">Annual Pass</option>
            </select>
            <span class="error-message" id="planError"></span>
        </div>

        <button type="submit">Submit Application</button>
    </form>
</div>

<script>
    const form = document.getElementById('gymForm');
    const fullName = document.getElementById('fullName');
    const email = document.getElementById('email');
    const age = document.getElementById('age');
    const plan = document.getElementById('plan');

    // Helper: Set error state
    function setError(input, message) {
        const formGroup = input.parentElement;
        const errorSpan = formGroup.querySelector('.error-message');
        formGroup.className = 'form-group error';
        errorSpan.innerText = message;
    }

    // Helper: Set success state
    function setSuccess(input) {
        const formGroup = input.parentElement;
        const errorSpan = formGroup.querySelector('.error-message');
        formGroup.className = 'form-group success';
        errorSpan.innerText = '';
    }

    // Validation logic for each field
    function validateName() {
        const value = fullName.value.trim();
        if (value === '') {
            setError(fullName, 'Name is required');
            return false;
        } else if (value.length < 3) {
            setError(fullName, 'Name must be at least 3 characters');
            return false;
        } else {
            setSuccess(fullName);
            return true;
        }
    }

    function validateEmail() {
        const value = email.value.trim();
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (value === '') {
            setError(email, 'Email is required');
            return false;
        } else if (!emailRegex.test(value)) {
            setError(email, 'Enter a valid email address');
            return false;
        } else {
            setSuccess(email);
            return true;
        }
    }

    function validateAge() {
        const value = age.value.trim();
        if (value === '') {
            setError(age, 'Age is required');
            return false;
        } else if (parseInt(value) < 16 || parseInt(value) > 100) {
            setError(age, 'Age must be between 16 and 100');
            return false;
        } else {
            setSuccess(age);
            return true;
        }
    }

    function validatePlan() {
        const value = plan.value;
        if (value === '') {
            setError(plan, 'Please select a membership plan');
            return false;
        } else {
            setSuccess(plan);
            return true;
        }
    }

    // Live Event Listeners
    fullName.addEventListener('input', validateName);
    email.addEventListener('input', validateEmail);
    age.addEventListener('input', validateAge);
    plan.addEventListener('change', validatePlan);

    // Form Submission check
    form.addEventListener('submit', function(e) {
        e.preventDefault(); // Stop form submission if invalid
        
        const isNameValid = validateName();
        const isEmailValid = validateEmail();
        const isAgeValid = validateAge();
        const isPlanValid = validatePlan();

        if (isNameValid && isEmailValid && isAgeValid && isPlanValid) {
            alert('Application submitted successfully!');
            form.reset();
            // Remove success classes after reset
            document.querySelectorAll('.form-group').forEach(group => group.classList.remove('success'));
        }
    });
</script>

</body>
</html>
