<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Shopping Cart & Array Methods</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 40px; display: flex; justify-content: center; }
        .cart-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 500px; }
        h2 { margin-top: 0; color: #1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .item-details { flex-grow: 1; }
        .item-name { font-weight: 600; color: #334155; }
        .item-meta { font-size: 13px; color: #64748b; }
        .remove-btn { background: #fee2e2; color: #ef4444; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .remove-btn:hover { background: #fca5a5; }
        .discount-section { margin: 20px 0; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 10px; border: 2px solid #e2e8f0; border-radius: 6px; font-size: 14px; }
        input:focus { border-color: #3b82f6; outline: none; }
        .apply-btn { background: #3b82f6; color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .apply-btn:hover { background: #2563eb; }
        .summary-box { background: #f8fafc; padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px solid #e2e8f0; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #475569; }
        .total-row { font-size: 18px; font-weight: bold; color: #1e293b; border-top: 1px dashed #cbd5e1; padding-top: 8px; margin-bottom: 0; }
        .promo-msg { font-size: 12px; color: #16a34a; font-weight: 500; margin-top: 4px; }
    </style>
</head>
<body>

<div class="cart-container">
    <h2>Shopping Cart</h2>
    
    <div id="cartItemsList"></div>

    <div class="discount-section">
        <input type="text" id="promoInput" placeholder="Enter Promo Code (SAVE10 or VIP20)">
        <button class="apply-btn" onclick="applyPromo()">Apply</button>
    </div>

    <div class="summary-box">
        <div class="summary-row">
            <span>Items Count:</span>
            <span id="totalItems">0</span>
        </div>
        <div class="summary-row">
            <span>Subtotal:</span>
            <span>$ <span id="subtotalPrice">0.00</span></span>
        </div>
        <div class="summary-row">
            <span>Discount Applied:</span>
            <span style="color: #dc2626;">-$ <span id="discountPrice">0.00</span></span>
        </div>
        <div class="summary-row total-row">
            <span>Grand Total:</span>
            <span>$ <span id="grandTotalPrice">0.00</span></span>
        </div>
        <div id="promoFeedback" class="promo-msg"></div>
    </div>
</div>

<script>
const cartState = {
    items: [
        { id: 101, name: "Wireless Headphones", price: 89.99, qty: 1 },
        { id: 102, name: "Mechanical Keyboard", price: 124.50, qty: 1 },
        { id: 103, name: "USB-C Hub Adapter", price: 29.99, qty: 2 }
    ],
    activeDiscount: 0 
};

function renderCart() {
    const listContainer = document.getElementById('cartItemsList');
    
    if (cartState.items.length === 0) {
        listContainer.innerHTML = `<p style="color: #94a3b8; text-align:center;">Your cart is empty.</p>`;
        calculateTotals();
        return;
    }

    const htmlRows = cartState.items.map(item => `
        <div class="cart-item">
            <div class="item-details">
                <div class="item-name">${item.name}</div>
                <div class="item-meta">${item.qty} pc(s) x $${item.price.toFixed(2)}</div>
            </div>
            <button class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
        </div>
    `);

    listContainer.innerHTML = htmlRows.join('');
    calculateTotals();
}

function calculateTotals() {

    const totals = cartState.items.reduce((accumulator, currentItem) => {
        accumulator.totalQty += currentItem.qty;
        accumulator.subtotal += currentItem.price * currentItem.qty;
        return accumulator;
    }, { totalQty: 0, subtotal: 0 }); 

    const discountAmount = totals.subtotal * (cartState.activeDiscount / 100);
    const grandTotal = totals.subtotal - discountAmount;

    document.getElementById('totalItems').textContent = totals.totalQty;
    document.getElementById('subtotalPrice').textContent = totals.subtotal.toFixed(2);
    document.getElementById('discountPrice').textContent = discountAmount.toFixed(2);
    document.getElementById('grandTotalPrice').textContent = grandTotal.toFixed(2);
}

function removeItem(itemId) {

    cartState.items = cartState.items.filter(item => item.id !== itemId);
    
    renderCart();
}

function applyPromo() {
    const code = document.getElementById('promoInput').value.trim().toUpperCase();
    const feedback = document.getElementById('promoFeedback');

    if (code === "SAVE10") {
        cartState.activeDiscount = 10;
        feedback.textContent = "Promo Code 'SAVE10' (10% Off) applied successfully!";
        feedback.style.color = "#16a34a";
    } else if (code === "VIP20") {
        cartState.activeDiscount = 20;
        feedback.textContent = "Promo Code 'VIP20' (20% Off) applied successfully!";
        feedback.style.color = "#16a34a";
    } else {
        cartState.activeDiscount = 0;
        feedback.textContent = "Invalid or expired promo code.";
        feedback.style.color = "#dc2626";
    }

    calculateTotals();
}

renderCart();
</script>

</body>
</html>
